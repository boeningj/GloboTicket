trigger: none

pr:
  branches:
    include:
      - main
  paths:
    include:
      - GloboTicket.Services.ShoppingBasket/**
      - k8s/aks/aks-shoppingbasket.yaml
      - k8s/aks/aks-config-shoppingbasket.yaml

pool:
  name: Default

variables:
  buildConfiguration: Release

steps:

- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '8.x'

- script: dotnet restore GloboTicket.Services.ShoppingBasket/GloboTicket.Services.ShoppingBasket.csproj
  displayName: Restore

- script: dotnet build GloboTicket.Services.ShoppingBasket/GloboTicket.Services.ShoppingBasket.csproj --no-restore -c $(buildConfiguration)
  displayName: Build

- script: dotnet test --no-build -c $(buildConfiguration)
  displayName: Test