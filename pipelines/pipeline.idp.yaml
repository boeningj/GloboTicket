name: idp-$(Build.SourceBranchName)-$(Date:yyyyMMdd)$(Rev:.r)

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - GloboTicket.IDP/**
      - k8s/aks/aks-idp.yaml
      - k8s/aks/aks-idp-service.yaml
      - k8s/aks/aks-config-idp.yaml

variables:
  tag: '$(Build.BuildId)'

stages:

# ----------------------
# BUILD STAGE
# ----------------------
- stage: Build
  displayName: Build and Push Image
  jobs:
  - job: Build
    pool:
      name: Default

    steps:
    - task: Docker@2
      displayName: Build and Push Image
      inputs:
        containerRegistry: 'sc-acr-globoticket'
        repository: 'globoticket-idp'
        command: 'buildAndPush'
        Dockerfile: 'GloboTicket.IDP/Dockerfile'
        buildContext: '.'
        tags: |
          $(tag)

# ----------------------
# DEPLOY STAGE
# ----------------------
- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build
  jobs:
  - job: Deploy
    pool:
      name: Default

    steps:

    # Replace #{tag}# in deployment YAML
    - task: replacetokens@5
      displayName: Replace Image Tag
      inputs:
        targetFiles: 'k8s/aks/aks-idp.yaml'
        tokenPattern: 'custom'
        tokenPrefix: '#{'
        tokenSuffix: '}#'

    # Apply Service FIRST (LoadBalancer)
    - task: Kubernetes@1
      displayName: Apply IDP Service
      inputs:
        connectionType: 'Kubernetes Service Connection'
        kubernetesServiceEndpoint: 'sc-aks-globoticket'
        namespace: 'globoticket'
        command: 'apply'
        useConfigurationFile: true
        configuration: 'k8s/aks/aks-idp-service.yaml'

    # Apply ConfigMap
    - task: Kubernetes@1
      displayName: Apply IDP ConfigMap
      inputs:
        connectionType: 'Kubernetes Service Connection'
        kubernetesServiceEndpoint: 'sc-aks-globoticket'
        namespace: 'globoticket'
        command: 'apply'
        useConfigurationFile: true
        configuration: 'k8s/aks/aks-config-idp.yaml'

    # Deploy IDP
    - task: Kubernetes@1
      displayName: Deploy IDP
      inputs:
        connectionType: 'Kubernetes Service Connection'
        kubernetesServiceEndpoint: 'sc-aks-globoticket'
        namespace: 'globoticket'
        command: 'apply'
        useConfigurationFile: true
        configuration: 'k8s/aks/aks-idp.yaml'