apiVersion: v1
kind: Service
metadata:
  name: svc-globoticket-gateway-ocelot
  namespace: globoticket
  labels:
    version: dev
    product: globoticket-gateway-ocelot
spec:
  type: LoadBalancer
  selector:
    app: globoticket-gateway-ocelot
  ports:
  - name: http
    port: 5050
    targetPort: 5050    
  - name: https
    port: 5051
    targetPort: 5051