apiVersion: v1
kind: Service
metadata:
  name: svc-globoticket-services-externalpaymentgateway
  namespace: globoticket
  labels:
    version: dev
    product: globoticket-services-externalpaymentgateway
spec:
  type: ClusterIP
  selector:
    app: globoticket-services-externalpaymentgateway
  ports:
  - port: 5004
    targetPort: 5004
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dep-globoticket-services-externalpaymentgateway
  namespace: globoticket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: globoticket-services-externalpaymentgateway
  template:
    metadata:
      labels:
        app: globoticket-services-externalpaymentgateway
    spec:
      containers:
      - name: globoticket-services-externalpaymentgateway
        image: globoticket.azurecr.io/globoticket-externalpaymentgateway:1.0
        imagePullPolicy: Always
        ports:
        - containerPort: 5004
        startupProbe:
          httpGet:
            path: /health/live
            port: 5004
          failureThreshold: 30
          periodSeconds: 2
        livenessProbe:
          httpGet:
            path: /health/live
            port: 5004
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 5004
          initialDelaySeconds: 5
          timeoutSeconds: 2
          periodSeconds: 5
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "128Mi"
        envFrom:
        - configMapRef:
            name: globoticket-common-config     