apiVersion: v1
kind: Service
metadata:
  name: svc-globoticket-services-discount
  namespace: globoticket
  labels:
    version: dev
    product: globoticket-services-discount
spec:
  type: ClusterIP
  selector:
    app: globoticket-services-discount
  ports:
  - port: 5007
    targetPort: 5007
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dep-globoticket-services-discount
  namespace: globoticket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: globoticket-services-discount
  template:
    metadata:
      labels:
        app: globoticket-services-discount
    spec:
      containers:
      - name: globoticket-services-discount
        image: globoticket.azurecr.io/globoticket-discount:1.0
        imagePullPolicy: Always
        ports:
        - containerPort: 5007
        startupProbe:
          httpGet:
            path: /health/live
            port: 5007
          failureThreshold: 30
          periodSeconds: 2
        livenessProbe:
          httpGet:
            path: /health/live
            port: 5007
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 5007
          initialDelaySeconds: 5
          timeoutSeconds: 3
          periodSeconds: 5
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "128Mi"
        envFrom:
        - configMapRef:
            name: globoticket-common-config
        - configMapRef:
            name: globoticket-discount-config
        - secretRef:
            name: globoticket-discount-secrets