apiVersion: v1
kind: Service
metadata:
  name: svc-globoticket-services-eventcatalog
  namespace: globoticket
  labels:
    version: dev
    product: globoticket-services-eventcatalog
spec:
  type: ClusterIP
  selector:
    app: globoticket-services-eventcatalog
  ports:
  - port: 5001
    targetPort: 5001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dep-globoticket-services-eventcatalog
  namespace: globoticket
spec:
  replicas: 1
  selector:
    matchLabels:
      app: globoticket-services-eventcatalog
  template:
    metadata:
      labels:
        app: globoticket-services-eventcatalog
    spec:
      containers:
      - name: globoticket-services-eventcatalog
        image: globoticket.azurecr.io/globoticket-eventcatalog:#{tag}#
        imagePullPolicy: Always
        ports:
        - containerPort: 5001
        startupProbe:
          httpGet:
            path: /health/live
            port: 5001
          failureThreshold: 30
          timeoutSeconds: 3
          periodSeconds: 2
        livenessProbe:
          httpGet:
            path: /health/live
            port: 5001
          initialDelaySeconds: 10
          timeoutSeconds: 2
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 5001
          initialDelaySeconds: 5
          timeoutSeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: "100m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
        envFrom:
        - configMapRef:
            name: globoticket-common-config
        - configMapRef:
            name: globoticket-eventcatalog-config
        - secretRef:
            name: globoticket-common-secrets