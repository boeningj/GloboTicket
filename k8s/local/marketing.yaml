apiVersion: v1
kind: Service
metadata:
  name: svc-globoticket-services-marketing
  labels:
    version: dev
    product: globoticket-services-marketing
spec:
  type: ClusterIP
  selector:
    app: globoticket-services-marketing
  ports:
  - port: 5008
    targetPort: 5008
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dep-globoticket-services-marketing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: globoticket-services-marketing
  template:
    metadata:
      labels:
        app: globoticket-services-marketing
    spec:
      containers:
      - name: globoticket-services-marketing
        image: globoticket-marketing
        imagePullPolicy: Never
        ports:
        - containerPort: 5008
        startupProbe:
          httpGet:
            path: /health/live
            port: 5008
          failureThreshold: 30
          periodSeconds: 2
        livenessProbe:
          httpGet:
            path: /health/live
            port: 5008
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 5008
          initialDelaySeconds: 5
          timeoutSeconds: 3
          periodSeconds: 5
        envFrom:
        - configMapRef:
            name: globoticket-common-config
        - secretRef:
            name: globoticket-marketing-secrets